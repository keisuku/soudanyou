<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300" viewBox="0 0 200 300">
  <rect width="200" height="300" fill="#2a1520" rx="8"/>
  <g transform="translate(100,150)">
    <!-- Wine bottle silhouette -->
    <rect x="-15" y="-80" width="30" height="40" rx="3" fill="#4a2035"/>
    <rect x="-8" y="-120" width="16" height="45" rx="2" fill="#4a2035"/>
    <rect x="-6" y="-128" width="12" height="12" rx="6" fill="#4a2035"/>
    <ellipse cx="0" cy="-38" rx="20" ry="8" fill="#4a2035"/>
    <rect x="-20" y="-38" width="40" height="90" rx="4" fill="#4a2035"/>
    <ellipse cx="0" cy="52" rx="20" ry="6" fill="#4a2035"/>
    <!-- Label -->
    <rect x="-14" y="-20" width="28" height="35" rx="2" fill="#8b2252" opacity="0.5"/>
    <line x1="-8" y1="-10" x2="8" y2="-10" stroke="#f5ede0" stroke-width="1" opacity="0.4"/>
    <line x1="-6" y1="-4" x2="6" y2="-4" stroke="#f5ede0" stroke-width="0.8" opacity="0.3"/>
